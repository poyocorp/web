<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — Poyoweb</title>
  <style>
    :root{ --bg:#f6f7fb; --card:#fff; --accent:#2274a5; --danger:#e05858 }
    body{ font-family:Inter,system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:var(--bg); margin:0; color:#111 }
    .wrap{ max-width:1100px; margin:26px auto; padding:20px }
    .row{ display:flex; gap:12px; align-items:center }
    .card{ background:var(--card); border-radius:10px; padding:16px; box-shadow:0 8px 20px rgba(15,23,42,0.06); }
    h1{ margin:0 0 12px }
    input, textarea{ padding:8px 10px; border-radius:8px; border:1px solid #e6e9f0 }
    textarea{ min-height:80px }
    button{ background:var(--accent); color:#fff; border:none; padding:8px 12px; border-radius:8px; cursor:pointer }
    .danger{ background:var(--danger) }
    .list{ margin-top:12px }
    .item{ display:flex; justify-content:space-between; gap:12px; padding:10px; border-bottom:1px solid #f0f2f7 }
    .muted{ color:#666 }
    .small{ padding:6px 8px; border-radius:6px; border:none; cursor:pointer }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
        <div id="adminHeader" style="margin-bottom:12px; display:flex; align-items:center; gap:12px; justify-content:space-between">
          <div>
            <strong>Admin</strong>
          </div>
          <div>
            <button id="adminLogoutBtn" class="small" style="display:inline-block">Sign out</button>
            <span id="adminLoginMsg" class="muted" style="margin-left:8px"></span>
          </div>
        </div>
        <div id="adminUI" style="display:none">
        <h1>Admin (static editor)</h1>
        <p class="muted">This is a client-only editor. It loads <code>data/stuff.json</code>, lets you edit items in the browser, and download an updated JSON file to upload to your server (FTP/file manager).</p>

        <section style="margin-top:12px">
          <h3>Add Item</h3>
          <div class="row">
            <input id="title" placeholder="Title">
            <input id="user" placeholder="@username">
            <input id="url" placeholder="https://...">
            <button id="addBtn">Add</button>
          </div>
          <div style="margin-top:8px"><textarea id="desc" placeholder="Short description"></textarea></div>
        </section>

        <section style="margin-top:14px">
          <div class="row" style="align-items:center;gap:8px;margin-bottom:10px">
            <button id="downloadBtn" class="small">Download JSON</button>
            <label style="display:inline-block;" class="small">Upload JSON <input id="uploadFile" type="file" accept="application/json" style="display:none"></label>
            <button id="reloadBtn" class="small">Reload from server</button>
          </div>
          <div class="list" id="itemsList"></div>
        </section>
        </div>
      </div>
  </div>

  <script>
    let items = [];
    let loggedIn = false;

    async function loadItems(){
      try{
        const r = await fetch('api/items.php', {cache:'no-store', credentials: 'include'});
        const j = await r.json();
        items = j.ok ? j.items : [];
      }catch(e){ items = []; }
      renderItems();
    }

    async function checkAuth(){
      try{
        const r = await fetch('api/auth.php', { credentials: 'include' });
        const j = await r.json();
        const adminUI = document.getElementById('adminUI');
        if (j && j.logged_in) {
          loggedIn = true;
          adminUI.style.display = 'block';
          const loginBtn = document.getElementById('adminLoginBtn');
          const logoutBtn = document.getElementById('adminLogoutBtn');
          if (loginBtn) loginBtn.style.display = 'none';
          if (logoutBtn) logoutBtn.style.display = 'inline-block';
          document.getElementById('adminLoginMsg').textContent = 'Signed in as '+(j.username||'');
          await loadItems();
        } else {
          loggedIn = false;
          if (adminUI) adminUI.style.display = 'none';
          const loginBtn = document.getElementById('adminLoginBtn');
          const logoutBtn = document.getElementById('adminLogoutBtn');
          if (loginBtn) loginBtn.style.display = 'inline-block';
          if (logoutBtn) logoutBtn.style.display = 'none';
          document.getElementById('adminLoginMsg').textContent = '';
          items = [];
          renderItems();
        }
      }catch(e){
        console.error('Auth check failed', e);
      }
    }

    function renderItems(){
      const list = document.getElementById('itemsList'); list.innerHTML = '';
      items.forEach((it, idx) =>{
        const el = document.createElement('div'); el.className='item';
        el.innerHTML = `<div><strong>${escapeHtml(it.title)}</strong><div class="muted">${escapeHtml(it.description)}</div></div><div><button class="small" data-idx="${idx}" onclick="edit(${idx})">Edit</button> <button class="small danger" onclick="del(${idx})">Delete</button></div>`;
        list.appendChild(el);
      });
    }

    function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    document.getElementById('addBtn').addEventListener('click', async ()=>{
      const title = document.getElementById('title').value.trim();
      if(!title) return alert('Title required');
      const payload = { action: 'create', title, description: document.getElementById('desc').value||'', username: document.getElementById('user').value||'', url: document.getElementById('url').value||'' };
      try{
        const r = await fetch('api/items.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload), credentials: 'include' });
        const j = await r.json();
        if (j.ok) { loadItems(); } else alert('Create failed: '+(j.error||'unknown'));
      }catch(e){ alert('Create failed: '+e.message); }
    });

    // No inline login here; unauthenticated users are redirected to login.html

    document.getElementById('adminLogoutBtn').addEventListener('click', async ()=>{
      await fetch('api/auth.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'logout' }), credentials: 'include' });
      loggedIn = false;
      document.getElementById('adminLoginMsg').textContent = 'Signed out';
      window.location.href = 'login.html';
    });

    async function del(idx){ if (!confirm('Delete item?')) return; const it = items[idx]; try{ const r = await fetch('api/items.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'delete', id: it.id }), credentials: 'include' }); const j = await r.json(); if (j.ok) loadItems(); else alert('Delete failed: '+(j.error||'unknown')); }catch(e){ alert('Delete failed: '+e.message); } }

    async function edit(idx){ const it = items[idx]; if(!it) return; const title = prompt('Title', it.title); if(title===null) return; const desc = prompt('Description', it.description); if(desc===null) return; const user = prompt('Username', it.username); if(user===null) return; const url = prompt('URL', it.url); if(url===null) return; try{ const r = await fetch('api/items.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'update', id: it.id, title, description: desc, username: user, url }), credentials: 'include' }); const j = await r.json(); if (j.ok) loadItems(); else alert('Update failed: '+(j.error||'unknown')); }catch(e){ alert('Update failed: '+e.message); } }

    document.getElementById('downloadBtn').addEventListener('click', ()=>{
      const blob = new Blob([JSON.stringify(items, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'stuff.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    });

    document.getElementById('uploadFile').addEventListener('change', async (e)=>{
      const f = e.target.files[0]; if(!f) return; const text = await f.text(); try{ const parsed = JSON.parse(text); if(!Array.isArray(parsed)) throw new Error('Expected array'); items = parsed; renderItems(); alert('Loaded JSON into editor. To persist to server, download and upload to server path `data/stuff.json`.'); }catch(err){ alert('Invalid JSON: '+err.message); }
    });

    document.getElementById('reloadBtn').addEventListener('click', ()=>loadItems());

    // On load, check auth and redirect to login if not authenticated
    (async function(){
      try{
        const r = await fetch('api/auth.php', { credentials: 'include' });
        const j = await r.json();
        if (j && j.logged_in) {
          // already authenticated — show UI
          document.getElementById('adminUI').style.display = 'block';
          document.getElementById('adminLoginMsg').textContent = 'Signed in as '+(j.username||'');
          loggedIn = true;
          await loadItems();
        } else {
          // redirect to separate login page
          window.location.href = 'login.html';
        }
      }catch(e){
        console.error('Auth check failed', e);
        window.location.href = 'login.html';
      }
    })();
  </script>
</body>
</html>
